name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        shell: bash
        run: |
          node --check main.js
          node --check preload.js
          node --check storage.js

      - name: Build Windows installer and portable app
        run: npm run build:win

      - name: Download previous Windows installer
        id: previous-installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force previous-release | Out-Null
          gh release download --repo "$env:GITHUB_REPOSITORY" --pattern "*Setup*.exe" --dir previous-release
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Windows installer found. Skipping update smoke test."
          }

          $installer = Get-ChildItem previous-release -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            "has_previous=true" >> $env:GITHUB_OUTPUT
          } else {
            "has_previous=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Test Windows installer update and data retention
        if: steps.previous-installer.outputs.has_previous == 'true'
        shell: pwsh
        run: ./tools/windows-installer-smoke.ps1 -PreviousInstaller ((Get-ChildItem previous-release -Filter "*Setup*.exe").FullName)

      - name: Upload Windows builds
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-manager-windows-x64
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error
