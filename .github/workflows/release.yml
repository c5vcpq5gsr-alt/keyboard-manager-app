name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; reusing it."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --generate-notes \
            --notes "### macOS-Installation

          Die macOS-App ist nicht mit einer kostenpflichtigen Apple Developer ID signiert. Nach dem Kopieren in den Programme-Ordner die App mit Rechtsklick → Öffnen starten. Falls sie weiterhin blockiert wird: Systemeinstellungen → Datenschutz & Sicherheit → Dennoch öffnen." \
            --verify-tag \
            --title "Keyboard Manager $RELEASE_TAG"

  build-macos:
    needs: prepare-release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run build:mac

      - name: Upload macOS build to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/*.dmg --repo "$GITHUB_REPOSITORY" --clobber

  build-windows:
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable app
        run: npm run build:win

      - name: Download previous Windows installer
        id: previous-installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force previous-release | Out-Null
          gh release download --repo "$env:GITHUB_REPOSITORY" --pattern "*Setup*.exe" --dir previous-release
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Windows installer found. Skipping update smoke test."
          }

          $installer = Get-ChildItem previous-release -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            "has_previous=true" >> $env:GITHUB_OUTPUT
          } else {
            "has_previous=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Test Windows installer update and data retention
        if: steps.previous-installer.outputs.has_previous == 'true'
        shell: pwsh
        run: ./tools/windows-installer-smoke.ps1 -PreviousInstaller ((Get-ChildItem previous-release -Filter "*Setup*.exe").FullName)

      - name: Upload Windows builds to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:RELEASE_TAG" (Get-ChildItem dist -Filter "*.exe").FullName --repo "$env:GITHUB_REPOSITORY" --clobber

  publish:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
