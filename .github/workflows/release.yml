name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run build:mac

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-manager-macos-arm64
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable app
        run: npm run build:win

      - name: Download previous Windows installer
        id: previous-installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force previous-release | Out-Null
          gh release download --repo "$env:GITHUB_REPOSITORY" --pattern "*Setup*.exe" --dir previous-release
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Windows installer found. Skipping update smoke test."
          }

          $installer = Get-ChildItem previous-release -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            "has_previous=true" >> $env:GITHUB_OUTPUT
          } else {
            "has_previous=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Test Windows installer update and data retention
        if: steps.previous-installer.outputs.has_previous == 'true'
        shell: pwsh
        run: ./tools/windows-installer-smoke.ps1 -PreviousInstaller ((Get-ChildItem previous-release -Filter "*Setup*.exe").FullName)

      - name: Upload Windows builds
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-manager-windows-x64
          path: dist/*.exe
          if-no-files-found: error

  publish:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download release builds
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          --notes "### macOS-Installation

          Die macOS-App ist nicht mit einer kostenpflichtigen Apple Developer ID signiert. Nach dem Kopieren in den Programme-Ordner die App mit Rechtsklick → Öffnen starten. Falls sie weiterhin blockiert wird: Systemeinstellungen → Datenschutz & Sicherheit → Dennoch öffnen."
          --verify-tag
          --title "Keyboard Manager $GITHUB_REF_NAME"
